<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SPUC RFID</title>
    <link rel="stylesheet" href="Styles/index.css">
</head>
<body>

    <!-- Animated background -->
    <div class="bg-animate"></div>

    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Floating particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="login-container">
        <div class="login-box-wrapper">
            <div class="login-box">
                <img src="Assets/LOGO.png" alt="SPUC Logo" class="logo">
                <h1>SWPUC | PHILIPPINES</h1>
                <h2>RFID System Login</h2>
                <div class="divider"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn-login">Login</button>
                    <p class="error-message" id="errorMsg"></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (username === 'admin' && password === 'admin123') {
                window.location.href = 'Pages/Dashboard.html';
            } else {
                errorMsg.textContent = 'Invalid username or password';
                errorMsg.style.animation = 'none';
                errorMsg.offsetHeight;
                errorMsg.style.animation = 'shake 0.4s ease';
            }
        });
    </script>
</body>
</html>
