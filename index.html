<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SPUC RFID</title>
    <link rel="stylesheet" href="Styles/index.css">
</head>
<body>

    <!-- Animated background -->
    <div class="bg-animate"></div>

    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Floating particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="login-container">
        <div class="login-box-wrapper">
            <div class="login-box">
                <img src="Assets/LOGO.png" alt="SPUC Logo" class="logo">
                <h1>SWPUC | PHILIPPINES</h1>
                <h2>RFID System Login</h2>
                <div class="divider"></div>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="Enter username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrap">
                            <input type="password" id="password" placeholder="Enter password" required>
                            <span class="eye-toggle" id="eyeToggle">👁</span>
                        </div>
                    </div>
                    <button type="submit" class="btn-login">Login</button>
                    <p class="error-message" id="errorMsg"></p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Script/supabaseClient.js"></script>
    <script>
        document.getElementById('eyeToggle').addEventListener('click', function() {
            const input = document.getElementById('password');
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            this.textContent = isHidden ? '🙈' : '👁';
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.querySelector('.btn-login');

            btn.textContent = 'Logging in...';
            btn.disabled = true;

            const { data, error } = await supabaseClient
                .from('profiles')
                .select('id, username')
                .eq('username', username)
                .eq('password', password)
                .single();

            btn.textContent = 'Login';
            btn.disabled = false;

            if (error || !data) {
                errorMsg.textContent = 'Invalid username or password';
                errorMsg.style.animation = 'none';
                errorMsg.offsetHeight;
                errorMsg.style.animation = 'shake 0.4s ease';
            } else {
                sessionStorage.setItem('profile_id', data.id);
                sessionStorage.setItem('username', data.username);
                sessionStorage.setItem('last_login', new Date().toISOString());
                window.location.href = 'Pages/Dashboard.html';
            }
        });
    </script>
</body>
</html>
